[build]
  base = "frontend/"
  command = "npm run build"
  publish = "dist"

# URL-prepend proxy: GET /http(s)://... → API server
[[redirects]]
  from = "/http*"
  to = "https://api.2md.traylinx.com/http:splat"
  status = 200
  force = true

# API proxy: /api/* → API server
[[redirects]]
  from = "/api/*"
  to = "https://api.2md.traylinx.com/api/:splat"
  status = 200
  force = true

# SPA fallback: everything else → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

[[edge_functions]]
  path = "/docs"
  function = "mintlify"

[[edge_functions]]
  path = "/docs/*"
  function = "mintlify"

[[edge_functions]]
  path = "/_mintlify/*"
  function = "mintlify"

[[edge_functions]]
  path = "/mintlify-assets/*"
  function = "mintlify"
